name: Coverage

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'coverage.json'

jobs:
  coverage:
    name: Generate Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo-tarpaulin binary
        id: cache-tarpaulin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: ${{ runner.os }}-tarpaulin-0.31.2

      - name: Install cargo-tarpaulin
        if: steps.cache-tarpaulin.outputs.cache-hit != 'true'
        run: cargo install cargo-tarpaulin --version 0.31.2 --locked

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript coverage
        run: pnpm vitest run --coverage

      - name: Verify TypeScript coverage output
        run: |
          echo "=== coverage/ contents ==="
          ls -la coverage/ || echo "directory not found"
          echo "=== coverage-summary.json (first 200 chars) ==="
          head -c 200 coverage/coverage-summary.json || echo "file not found"

      - name: Run Rust coverage
        working-directory: src-tauri
        run: |
          mkdir -p coverage
          cargo tarpaulin --out Json > coverage/tarpaulin-report.json 2>&1

      - name: Verify Rust coverage output
        run: |
          echo "=== src-tauri/coverage/ contents ==="
          ls -la src-tauri/coverage/ || echo "directory not found"
          echo "=== tarpaulin-report.json (first 200 chars) ==="
          head -c 200 src-tauri/coverage/tarpaulin-report.json || echo "file not found"

      - name: Write coverage.json
        run: |
          node -e "
            const fs = require('fs');
            const ts = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const raw = fs.readFileSync('src-tauri/coverage/tarpaulin-report.json', 'utf8');
            const rust = JSON.parse(raw.slice(raw.indexOf('{')));
            const tsPct   = parseFloat(ts.total.lines.pct.toFixed(1));
            const rustPct = parseFloat((rust.coverage * 100).toFixed(1));
            const total   = parseFloat(((tsPct + rustPct) / 2).toFixed(1));
            fs.writeFileSync('coverage.json', JSON.stringify({ ts: tsPct, rust: rustPct, total }));
            console.log('TS: ' + tsPct + '%  Rust: ' + rustPct + '%  Total: ' + total + '%');
          "

      - name: Commit and push coverage.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.json
          if git diff --cached --quiet; then
            echo "coverage.json unchanged — skipping commit"
          else
            git commit -m "chore: update coverage.json [skip ci]"
            git push
          fi
