name: Coverage

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'coverage.json'

jobs:
  coverage:
    name: Generate Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript coverage
        run: pnpm vitest run --coverage

      - name: Run Rust coverage
        run: cargo llvm-cov --json --output-path rust-coverage.json --manifest-path src-tauri/Cargo.toml --ignore-filename-regex "commands/"

      - name: Write coverage.json
        run: |
          node -e "
            const fs = require('fs');
            const ts   = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const rust = JSON.parse(fs.readFileSync('rust-coverage.json', 'utf8'));
            const tsPct   = parseFloat(ts.total.lines.pct.toFixed(1));
            const rustPct = parseFloat(rust.data[0].totals.lines.percent.toFixed(1));
            const total   = parseFloat(((tsPct + rustPct) / 2).toFixed(1));
            fs.writeFileSync('coverage.json', JSON.stringify({ ts: tsPct, rust: rustPct, total }));
            console.log('TS: ' + tsPct + '%  Rust: ' + rustPct + '%  Total: ' + total + '%');
          "

      - name: Commit and push coverage.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.json
          if git diff --cached --quiet; then
            echo "coverage.json unchanged — skipping commit"
          else
            git commit -m "chore: update coverage.json [skip ci]"
            git push
          fi
