name: Bump Version
run-name: Bump Version to ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (semver, e.g. 1.2.0)"
        required: true
        type: string

jobs:
  bump:
    name: Bump Version to ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version files, commit, and tag
        run: bash scripts/bump-version.sh ${{ github.event.inputs.version }}

  build:
    name: Build & Release
    needs: bump
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      tag: v${{ github.event.inputs.version }}
